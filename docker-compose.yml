# ==============================================================================
# VeraMarket — Docker Compose (Desarrollo Local)
# ==============================================================================
# Uso:
#   docker compose up -d          → Levantar todos los servicios
#   docker compose down           → Detener servicios
#   docker compose logs -f backend → Ver logs del backend
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL 15 + PostGIS
  # ============================================================================
  db:
    image: postgis/postgis:15-3.4
    container_name: veramarket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: veramarket
      POSTGRES_PASSWORD: veramarket_dev
      POSTGRES_DB: veramarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veramarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Typesense — Motor de búsqueda Full-Text + Facetado + GeoSearch
  # ============================================================================
  typesense:
    image: typesense/typesense:27.0
    container_name: veramarket-typesense
    restart: unless-stopped
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-xyz-dev-typesense-key}
      --enable-cors
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data

  # ============================================================================
  # Backend — FastAPI
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veramarket-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      typesense:
        condition: service_started
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://veramarket:veramarket_dev@db:5432/veramarket}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      JWT_EXPIRATION_MINUTES: "${JWT_EXPIRATION_MINUTES:-1440}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      TZ: "${TZ:-America/Bogota}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
      TYPESENSE_API_KEY: "${TYPESENSE_API_KEY:-xyz-dev-typesense-key}"
      TYPESENSE_HOST: "${TYPESENSE_HOST:-typesense}"
      TYPESENSE_PORT: "${TYPESENSE_PORT:-8108}"
      TYPESENSE_PROTOCOL: "${TYPESENSE_PROTOCOL:-http}"
      TYPESENSE_TIMEOUT_SECONDS: "${TYPESENSE_TIMEOUT_SECONDS:-2.0}"
      TYPESENSE_COLLECTION_PRODUCTS: "${TYPESENSE_COLLECTION_PRODUCTS:-products}"
      SEMANTIC_DAILY_LIMIT: "${SEMANTIC_DAILY_LIMIT:-10}"
      BUSINESS_TIMEZONE: "${BUSINESS_TIMEZONE:-America/Bogota}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================================================
  # Frontend — Next.js 14
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veramarket-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
      NEXT_PUBLIC_DEFAULT_LAT: "3.3516"
      NEXT_PUBLIC_DEFAULT_LNG: "-76.5320"
    ports:
      - "3000:3000"

volumes:
  pgdata:
    driver: local
  typesense_data:
    driver: local
