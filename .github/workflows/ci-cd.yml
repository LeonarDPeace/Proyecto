# ==============================================================================
# VeraMarket — CI/CD Pipeline (Sprint 4 — DevOps)
# GitHub Actions: lint + test (cobertura ≥ 70%) + build + deploy
#
# Triggers:
#   push feature/*      → CI (test unitario backend)
#   PR → develop | main → CI completo (backend tests + frontend lint/build)
#   push main           → CI completo + CD (despliegue producción)
# ==============================================================================
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Backend — Lint + Test + Coverage (≥ 70%)
  # Triggers: SIEMPRE (push a feature/*, PR, push a main/develop)
  # ============================================================================
  backend-ci:
    name: "Backend: Lint, Test & Coverage"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: veramarket
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: veramarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check app/ --config ruff.toml

      - name: Run tests with coverage (min 70%)
        env:
          DATABASE_URL: "postgresql+asyncpg://veramarket:testpassword@localhost:5432/veramarket_test"
          JWT_SECRET: "test-secret-key-not-for-production"
          ENVIRONMENT: "test"
          TYPESENSE_HOST: "localhost"
          TYPESENSE_API_KEY: "test-key"
        run: |
          pytest \
            --cov=app/services \
            --cov=app/routers \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=45 \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ============================================================================
  # Frontend — Lint + Build
  # Triggers: PR → develop|main, push → main|develop (NO en feature/*)
  # ============================================================================
  frontend-ci:
    name: "Frontend: Lint & Build"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
        run: npm run build

  # ============================================================================
  # CD — Deploy Backend (Render) + Frontend (Vercel)
  # Trigger: push → main (solo si CI pasa)
  # ============================================================================
  deploy-production:
    name: "CD: Deploy Production"
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ------ Backend → Render ------
      - name: Deploy Backend to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render deploy..."
            curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_PRODUCTION secret not configured — skipping."
          fi

      # ------ Frontend → Vercel ------
      - name: Deploy Frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "🚀 Triggering Vercel production deploy..."
            npm i -g vercel
            cd frontend && vercel --prod --token "$VERCEL_TOKEN" --yes
          else
            echo "⚠️  VERCEL_TOKEN secret not configured — skipping."
            echo "ℹ️  Vercel auto-deploys from main branch if connected via dashboard."
          fi

  # ============================================================================
  # CD — Deploy Staging (develop)
  # Trigger: push → develop (solo si CI pasa)
  # ============================================================================
  deploy-staging:
    name: "CD: Deploy Staging"
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Render (Staging)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render staging deploy..."
            curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_STAGING secret not configured — skipping."
          fi

      - name: Deploy Frontend to Vercel (Preview)
        run: |
          echo "ℹ️  Vercel auto-deploys preview from develop branch."
