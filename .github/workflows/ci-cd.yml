# ==============================================================================
# VeraMarket — CI/CD Pipeline
# GitHub Actions: lint + test + deploy
# ==============================================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # Backend — Lint + Test
  # ============================================================================
  backend-lint-test:
    name: "Backend: Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: veramarket
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: veramarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check app/

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://veramarket:testpassword@localhost:5432/veramarket_test"
          JWT_SECRET: "test-secret-key-not-for-production"
          ENVIRONMENT: "test"
        run: pytest -v --tb=short

  # ============================================================================
  # Frontend — Lint + Build
  # ============================================================================
  frontend-lint-build:
    name: "Frontend: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
        run: npm run build

  # ============================================================================
  # Deploy Staging (develop → Render preview + Vercel preview)
  # ============================================================================
  deploy-staging:
    name: "Deploy: Staging"
    needs: [backend-lint-test, frontend-lint-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Render (Preview)
        run: |
          echo "🚀 Deploy backend to Render staging..."
          # TODO: Configurar Render Deploy Hook
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Deploy Frontend to Vercel (Preview)
        run: |
          echo "🚀 Deploy frontend to Vercel preview..."
          # Vercel auto-deploys from develop branch

  # ============================================================================
  # Deploy Production (main → Render + Vercel)
  # ============================================================================
  deploy-production:
    name: "Deploy: Production"
    needs: [backend-lint-test, frontend-lint-build]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Render (Production)
        run: |
          echo "🚀 Deploy backend to Render production..."
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}"

      - name: Deploy Frontend to Vercel (Production)
        run: |
          echo "🚀 Deploy frontend to Vercel production..."
          # Vercel auto-deploys from main branch
